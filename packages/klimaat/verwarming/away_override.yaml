klimaat_verwarming_away_override:
# Klimaat Package - Verwarming Away Override
# Eco mode na 1u away, uit na 4u away
# Gebruikt dynamische entity discovery via label 'Verwarming'

  automation:
    # Away modus: eco na 1u, uit na 4u
    - id: verwarming_away_modus
      alias: 'Verwarming away modus'
      description: 'Verwarming eco (-2°C) na 1u afwezigheid, uit na 4u afwezigheid'
      mode: restart

      trigger:
        # Eco mode na 1u
        - platform: state
          entity_id: alarm_control_panel.ha_alarm
          to: 'armed_away'
          for:
            hours: 1
          id: eco

        # Uit na 4u
        - platform: state
          entity_id: alarm_control_panel.ha_alarm
          to: 'armed_away'
          for:
            hours: 4
          id: uit

      variables:
        eco_delta: -2
        verwarming_schedules: "{{ label_entities('Verwarming') | select('match', '^schedule\\.') | list }}"
        verwarming_climates: "{{ label_entities('Verwarming') | select('match', '^climate\\.') | list }}"

      action:
        - choose:
            # Eco mode: -2°C voor actieve schedules
            - conditions:
                - condition: trigger
                  id: eco
              sequence:
                - repeat:
                    for_each: "{{ verwarming_schedules }}"
                    sequence:
                      - if:
                          - condition: template
                            value_template: "{{ is_state(repeat.item, 'on') }}"
                        then:
                          - variables:
                              kamer: "{{ repeat.item.split('.')[1].replace('verwarming_', '') }}"
                              climate_entity: "climate.{{ kamer }}"
                              schedule_temp: "{{ state_attr(repeat.item, 'temperature') | float(21) }}"
                              eco_temp: "{{ schedule_temp + eco_delta }}"

                          - service: climate.set_temperature
                            target:
                              entity_id: "{{ climate_entity }}"
                            data:
                              temperature: "{{ eco_temp }}"
                              hvac_mode: heat

            # Alles uit na 4u
            - conditions:
                - condition: trigger
                  id: uit
              sequence:
                - service: climate.turn_off
                  target:
                    entity_id: "{{ verwarming_climates }}"

    # Herstel bij thuiskomst
    - id: verwarming_away_herstel
      alias: 'Verwarming herstel bij thuiskomst'
      description: 'Herstel schedule temperaturen bij einde afwezigheid'
      mode: single

      trigger:
        - platform: state
          entity_id: alarm_control_panel.ha_alarm
          from: 'armed_away'
          not_to:
            - 'triggered'

      variables:
        verwarming_schedules: "{{ label_entities('Verwarming') | select('match', '^schedule\\.') | list }}"

      action:
        # Update alle schedules om schema.yaml automations te triggeren
        - repeat:
            for_each: "{{ verwarming_schedules }}"
            sequence:
              - service: schedule.reload
                target:
                  entity_id: "{{ repeat.item }}"
