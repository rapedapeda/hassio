klimaat_verwarming_schema:
# Klimaat Package - Verwarming Schema
# Generieke automation voor kamers met schedule
# Handmatige override blijft actief tot volgende schedule change

  automation:
    - id: verwarming_schema
      alias: 'Verwarming schema'
      description: 'Volg schedule temperatuur per kamer'
      mode: parallel
      max: 10

      trigger:
        # Alleen schedules - climate triggers NIET (handmatige override mogelijk)
        - platform: state
          entity_id:
            - schedule.verwarming_woonkamer

      variables:
        # Extract kamer uit entity_id
        kamer: "{{ trigger.entity_id.split('.')[1].replace('verwarming_', '') }}"
        climate_entity: "climate.{{ kamer }}"
        schedule_entity: "schedule.verwarming_{{ kamer }}"
        auto_boolean: "input_boolean.verwarming_{{ kamer }}_auto"

      action:
        - choose:
            # Schema aan + auto mode aan → set temperatuur
            - conditions:
                - condition: state
                  entity_id: "{{ schedule_entity }}"
                  state: 'on'
                - condition: state
                  entity_id: "{{ auto_boolean }}"
                  state: 'on'
              sequence:
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ climate_entity }}"
                  data:
                    temperature: "{{ state_attr(schedule_entity, 'temperature') | float(21) }}"
                    hvac_mode: heat

          # Default: schema uit of auto uit → verwarming uit
          default:
            - service: climate.turn_off
              target:
                entity_id: "{{ climate_entity }}"
