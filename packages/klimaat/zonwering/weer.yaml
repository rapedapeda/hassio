klimaat_zonwering_weer:
# Klimaat Package - Zonwering Weer
# Generieke weersensoren voor zonwering

  template:
    - sensor:
        # DNI-benadering: GHI gecorrigeerd voor zonhoogte
        # Geeft betere indicatie van directe straling op verticale vlakken
        - name: "Zonwering instraling"
          unique_id: zonwering_instraling
          unit_of_measurement: "W/m²"
          state: >-
            {% set ghi = (states('sensor.irradiance') if states('sensor.irradiance') not in ['unknown','unavailable','none',''] else states('sensor.zonnepanelen_radiation')) | float(0) %}
            {% set elevation_rad = state_attr('sun.sun', 'elevation') | float(0) * pi / 180 %}
            {% set sin_el = [sin(elevation_rad), sin(10 * pi / 180)] | max %}
            {{ (ghi / sin_el) | round(0) }}

    - binary_sensor:
        # Is het qua straling en seizoen nodig om zonwering in te schakelen?
        - name: "Zonwering nodig"
          unique_id: zonwering_nodig
          default_entity_id: binary_sensor.zonwering_nodig
          device_class: heat
          delay_on:
            minutes: 5
          delay_off:
            minutes: 5
          state: >-
            {{
              (3 < now().month < 10)
              and
              states('sensor.zonwering_instraling') | int(0) >= states('input_number.zonwering_irradiance_threshold') | int(250)
            }}

        # Is het weer veilig voor zonwering? (geen wind/regen)
        - name: "Veilig voor zonwering"
          unique_id: zonwering_veilig
          default_entity_id: binary_sensor.zonwering_veilig
          delay_on:
            minutes: 10
          delay_off: 0
          state: >-
            {{
              states('sensor.weerstation_rain_rate')|float(0) == 0
              and
              states('sensor.weerstation_wind_gust')|float(0) < states('input_number.zonwering_wind_threshold')|int(30)
            }}
