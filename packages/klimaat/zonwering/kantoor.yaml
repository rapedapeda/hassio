klimaat_zonwering_kantoor:
# Klimaat Package - Zonwering Kantoor
# Helpers, sensoren en automations voor rolluik voorkant

  input_boolean:
    zonwering_kantoor_auto:
      name: Auto rolluik
      icon: mdi:window-shutter

  template:
    - sensor:
        # Gewenste positie op basis van zon voorkant
        - name: "Rolluik positie"
          unique_id: zonwering_kantoor_positie
          default_entity_id: sensor.zonwering_kantoor_positie
          unit_of_measurement: "%"
          state: >-
            {% set zon_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
            {% set zon_azimuth = state_attr('sun.sun', 'azimuth') | int(0) %}

            {# Zon op voorkant: azimuth 227-293, elevation > 1 #}
            {% if zon_elevation > 1 and 227 < zon_azimuth < 293 %}
              {% if is_state('binary_sensor.zonwering_nodig', 'on') %}
                30
              {% else %}
                100
              {% endif %}
            {% else %}
              100
            {% endif %}

    - binary_sensor:
        # Is de temperatuur (buiten of binnen) hoog genoeg voor zonwering?
        - name: "Zonwering kantoor temperatuur"
          unique_id: zonwering_kantoor_temperatuur
          state: >-
            {{
              [states('sensor.knmi_max_temperature_today')|int(10), states('sensor.weerstation_outdoor_temperature')|int(10)] | max >= states('input_number.zonwering_buitentemperatuur_threshold')|int(0)
              or
              states('sensor.temperatuur_kantoor')|float(0) >= 20
            }}
          delay_on:
            minutes: 5
          delay_off:
            minutes: 30

  automation:
    - id: zonwering_kantoor_positie
      alias: 'Zonwering kantoor positie'
      description: 'Automatische zonwering kantoor op basis van zon en temperatuur'
      mode: restart

      trigger:
        - platform: state
          entity_id: sensor.zonwering_kantoor_positie
        - platform: state
          entity_id: binary_sensor.zonwering_nodig
        - platform: state
          entity_id: binary_sensor.zonwering_kantoor_temperatuur
        - platform: state
          entity_id: input_boolean.zonwering_kantoor_auto
          to: 'on'

      action:
        - choose:
            # AUTOMATISCH: Alleen als auto mode aan staat
            - conditions:
                - condition: state
                  entity_id: input_boolean.zonwering_kantoor_auto
                  state: 'on'
              sequence:
                - choose:
                    # Alle condities OK: volg positie sensor
                    - conditions:
                        - condition: state
                          entity_id: binary_sensor.zonwering_nodig
                          state: 'on'
                        - condition: state
                          entity_id: binary_sensor.zonwering_kantoor_temperatuur
                          state: 'on'
                      sequence:
                        - service: cover.set_cover_position
                          target:
                            entity_id: cover.kantoor
                          data:
                            position: "{{ states('sensor.zonwering_kantoor_positie') | int }}"
                  # Niet alle condities: rolluik open
                  default:
                    - service: cover.set_cover_position
                      target:
                        entity_id: cover.kantoor
                      data:
                        position: 100
