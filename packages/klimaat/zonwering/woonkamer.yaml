klimaat_zonwering_woonkamer:
# Klimaat Package - Zonwering Woonkamer
# Helpers, sensoren en automations voor zonnescherm achterkant

  input_boolean:
    zonwering_woonkamer_auto:
      name: Auto zonnescherm
      icon: mdi:sun-snowflake-variant

  template:
    - sensor:
        # Berekende gewenste positie op basis van zonhoek en wind
        - name: "Zonnescherm positie"
          unique_id: zonwering_woonkamer_positie
          default_entity_id: sensor.zonwering_woonkamer_positie
          unit_of_measurement: "%"
          state: >-
            {% set zon_altitude = (state_attr('sun.sun', 'elevation') *pi/180) | float(0) %}
            {% set zon_azimuth = state_attr('sun.sun', 'azimuth') | int(0) %}
            {% set azimuth_lower = 63 | float %}
            {% set azimuth_upper = 200 | float %}
            {% set schermhoogte = 200 | float %} {# centimeters #}
            {% set max_schermlengte = 240 | float %} {# centimeters #}
            {% set schermorientatie = 123 * pi/180 | float %} {# orientatie van het zonnescherm in radialen #}
            {% set wind = states('sensor.buienradar_wind_gust') | float(0) %}
            {% set wind_upper = states('input_number.zonwering_wind_threshold') | int(30) %}

            {# Bereken de effectieve lengte van het scherm op basis van de horizontale positie van de zon #}
            {% set zon_azimuth_rad = zon_azimuth * pi/180 %}
            {% set schermlengte = max_schermlengte / cos(zon_azimuth_rad - schermorientatie) %}

            {# Alleen als de zon op het raam staat #}
            {% if azimuth_lower < zon_azimuth < azimuth_upper %}
              {# Bereken de gewenste positie van het scherm, met als max de schermlengte #}
              {# Zorg ook dat we afrond op 1 decimaal, zodat het percentage in stappen van 10% gaat #}
              {% set positie = min([(schermhoogte / tan(zon_altitude)), schermlengte ]) | round(0) %}
              {# Vertaal het naar een relatieve positie #}
              {% set positie_rel = ((positie / schermlengte) | round(1)) * 100 | int(0) %}
              {% if wind < wind_upper %}
                {{ positie_rel }}
              {% else %}
                {{ min(positie_rel, 40) }}
              {% endif %}
            {% else %}
              0
            {% endif %}

  automation:
    - id: zonwering_woonkamer_positie
      alias: 'Zonwering woonkamer positie'
      description: 'Automatische zonwering woonkamer op basis van weer, zon en temperatuur'
      mode: restart

      trigger:
        # Bij wijziging van de gewenste positie
        - platform: state
          entity_id: sensor.zonwering_woonkamer_positie

        # Bij wijziging van zonwering nodig
        - platform: state
          entity_id: binary_sensor.zonwering_nodig

        # Bij wijziging van zonwering veilig
        - platform: state
          entity_id: binary_sensor.zonwering_veilig

        # Bij wijziging binnentemperatuur
        - platform: state
          entity_id: sensor.temperatuur_woonkamer

      action:
        - choose:
            # VEILIGHEID: Bij onveilig weer ALTIJD retracteren (ook als auto uit is)
            - conditions:
                - condition: state
                  entity_id: binary_sensor.zonwering_veilig
                  state: 'off'
              sequence:
                - service: cover.set_cover_position
                  target:
                    entity_id: cover.woonkamer
                  data:
                    position: 0

            # AUTOMATISCH: Alleen als auto mode aan staat
            - conditions:
                - condition: state
                  entity_id: input_boolean.zonwering_woonkamer_auto
                  state: 'on'
              sequence:
                - choose:
                    # Bij slecht weer: scherm in
                    - conditions:
                        - condition: state
                          entity_id: binary_sensor.zonwering_nodig
                          state: 'off'
                      sequence:
                        - service: cover.set_cover_position
                          target:
                            entity_id: cover.woonkamer
                          data:
                            position: 0

                    # Bij goed weer en veilig: check temperatuur en volg positie
                    - conditions:
                        - condition: state
                          entity_id: binary_sensor.zonwering_nodig
                          state: 'on'
                        - condition: state
                          entity_id: binary_sensor.zonwering_veilig
                          state: 'on'
                        - condition: template
                          value_template: >-
                            {{ states('sensor.temperatuur_woonkamer')|float(0) >= states('input_number.zonwering_binnentemperatuur_threshold')|int(0) }}
                      sequence:
                        - service: cover.set_cover_position
                          target:
                            entity_id: cover.woonkamer
                          data:
                            position: "{{ states('sensor.zonwering_woonkamer_positie') | int }}"
