klimaat_ventilatie_helpers:
# Klimaat Package - Ventilatie Helpers
# Modi en cooling threshold voor ventilatie

  input_boolean:
    ventilatie_auto:
      name: Auto ventilatie
      icon: mdi:fan-auto

  input_number:
    ventilatie_cooling_threshold:
      name: Ventilatie nachtkoeling threshold
      min: 18
      max: 26
      step: 0.5
      initial: 21
      unit_of_measurement: "°C"
      icon: mdi:thermometer
      mode: box
