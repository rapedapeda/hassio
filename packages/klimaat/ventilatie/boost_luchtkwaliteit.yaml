klimaat_ventilatie_boost_luchtkwaliteit:
# Klimaat Package - Ventilatie Boost Luchtkwaliteit
# Automatische boost bij hoge CO2 of luchtvochtigheid

  automation:
    - id: ventilatie_boost_luchtkwaliteit
      alias: 'Ventilatie boost luchtkwaliteit'
      description: 'Boost 66% bij slechte luchtkwaliteit, terug naar 33% als goed'
      mode: restart

      trigger:
        - platform: state
          entity_id: binary_sensor.ventilatie_luchtkwaliteit_slecht
          to: 'on'
          id: boost_aan

        - platform: state
          entity_id: binary_sensor.ventilatie_luchtkwaliteit_slecht
          to: 'off'
          id: boost_uit

      condition:
        # Alleen als auto mode aan staat
        - condition: state
          entity_id: input_boolean.ventilatie_auto
          state: 'on'

        # Ventilatie moet aan staan
        - condition: state
          entity_id: fan.wtw
          state: 'on'

      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: boost_aan
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.wtw
                  data:
                    percentage: 66

            - conditions:
                - condition: trigger
                  id: boost_uit
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.wtw
                  data:
                    percentage: 33
