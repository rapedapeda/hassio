klimaat_ventilatie_fan:
# Klimaat Package - Ventilatie Fan Entity
# Template fan die WTW switches combineert tot fan.wtw

  template:
    - fan:
        - name: "WTW"
          unique_id: ventilatie_wtw
          state: >
            {{ not is_state('switch.wtw_0', 'on') }}
          percentage: >
            {% if is_state('switch.wtw_3', 'on') %}
              100
            {% elif is_state('switch.wtw_2', 'on') %}
              66
            {% elif is_state('switch.wtw_1', 'on') %}
              33
            {% else %}
              0
            {% endif %}
          turn_on:
            - service: switch.turn_on
              target:
                entity_id: switch.wtw_1
          turn_off:
            - service: switch.turn_on
              target:
                entity_id: switch.wtw_0
          set_percentage:
            - service: script.set_ventilatie_stand
              data:
                percentage: "{{ percentage }}"
          speed_count: 3
