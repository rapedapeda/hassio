klimaat_ventilatie_sensoren:
# Klimaat Package - Ventilatie Sensoren
# Binary sensors voor luchtkwaliteit en bypass beslissingen

  sensor:
    # Statistics sensor voor relatieve vochtigheidsdetectie
    - platform: statistics
      name: "Badkamer luchtvochtigheid gemiddelde"
      unique_id: ventilatie_badkamer_humidity_statistics
      entity_id: sensor.luchtvochtigheid_badkamer
      sampling_size: 200
      state_characteristic: mean
      max_age:
        hours: 48

  #Deze doen we via de GUI voor flexibiliteit
  #binary_sensor:
  #  - platform: threshold
  #    name: "Ventilatie nachtkoeling nodig"
  #    entity_id: sensor.temperatuur_bovenverdieping
  #    upper: 21
  #    hysteresis: 0.5

  template:
    - binary_sensor:
        # CO2 te hoog?
        - name: "CO2 te hoog"
          unique_id: ventilatie_co2
          default_entity_id: binary_sensor.ventilatie_co2
          delay_off:
            minutes: 10
          state: >-
            {{ states('sensor.co2_sensoren')|int(0) > 1000 }}

        # Luchtvochtigheid te hoog in badkamer?
        - name: "Badkamer vochtig"
          unique_id: ventilatie_humidity
          default_entity_id: binary_sensor.ventilatie_humidity
          delay_off:
            minutes: 10
          state: >-
            {{
              (states('sensor.luchtvochtigheid_badkamer')|float(1) - states('sensor.badkamer_luchtvochtigheid_gemiddelde')|float(1)) / states('sensor.badkamer_luchtvochtigheid_gemiddelde')|float(1) > 0.1
              and
              states('sensor.luchtvochtigheid_badkamer')|float(0) > 65
            }}

        # Bypass simulatie (zou bypass aan moeten staan?)
        - name: "Bypass open"
          unique_id: ventilatie_bypass
          default_entity_id: binary_sensor.ventilatie_bypass
          delay_on:
            minutes: 10
          delay_off:
            minutes: 10
          state: >-
            {% set binnen_temp = states('sensor.temperatuur_huis')|float(20) %}
            {% set buiten_temp = (states('sensor.weerstation_outdoor_temperature') if states('sensor.weerstation_outdoor_temperature') not in ['unknown','unavailable','none',''] else states('sensor.knmi_temperature')) | float(0) %}
            {{
              buiten_temp > 10
              and
              binnen_temp > states('input_number.ventilatie_cooling_threshold')|float(21)
            }}
