klimaat_ventilatie_away_modus:
# Klimaat Package - Ventilatie Away Modus
# Ventilatie uit als niemand thuis is
# ALTIJD actief (ook als ventilatie_auto uit staat)

  automation:
    - id: ventilatie_away_modus
      alias: 'Ventilatie away modus'
      description: 'Ventilatie uit als niemand thuis, anders aan naar 33%'
      mode: restart

      trigger:
        - platform: state
          entity_id: alarm_control_panel.huis

      action:
        - choose:
            # Niemand thuis: ventilatie uit
            - conditions:
                - condition: state
                  entity_id: alarm_control_panel.huis
                  state: 'armed_away'
              sequence:
                - service: fan.turn_off
                  target:
                    entity_id: fan.wtw

          # Default: thuis, ventilatie aan (33%)
          default:
            - service: fan.set_percentage
              target:
                entity_id: fan.wtw
              data:
                percentage: 33
