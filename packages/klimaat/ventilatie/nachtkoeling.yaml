klimaat_ventilatie_nachtkoeling:
# Klimaat Package - Ventilatie Nachtkoeling
# Automatische nachtkoeling op warme zomernachten

  automation:
    - id: ventilatie_nachtkoeling
      alias: 'Ventilatie nachtkoeling'
      description: 'Ventilatie naar 100% als warm en bypass aan, anders 33%'
      mode: restart

      trigger:
        - platform: state
          entity_id: binary_sensor.ventilatie_nachtkoeling_nodig
          to:
            - 'on'
            - 'off'

        - platform: state
          entity_id: binary_sensor.ventilatie_bypass
          to:
            - 'on'
            - 'off'

      condition:
        # Alleen als auto mode aan staat
        - condition: state
          entity_id: input_boolean.ventilatie_auto
          state: 'on'

      action:
        - choose:
            # Nachtkoeling aan: temp te hoog EN bypass aan
            - conditions:
                - condition: state
                  entity_id: binary_sensor.ventilatie_nachtkoeling_nodig
                  state: 'on'
                - condition: state
                  entity_id: binary_sensor.ventilatie_bypass
                  state: 'on'
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.wtw
                  data:
                    percentage: 100

          # Default: nachtkoeling uit, respecteer aanwezigheid en luchtkwaliteit
          default:
            - choose:
                # Weg: fan helemaal uit
                - conditions:
                    - condition: state
                      entity_id: alarm_control_panel.huis
                      state: armed_away
                  sequence:
                    - service: fan.turn_off
                      target:
                        entity_id: fan.wtw
              # Thuis: 33% of 66% als luchtkwaliteit slecht
              default:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.wtw
                  data:
                    percentage: >-
                      {{ 66 if is_state('binary_sensor.ventilatie_luchtkwaliteit_slecht', 'on') else 33 }}
