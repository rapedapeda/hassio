      alias: "Stofzuigen: handmatig beneden"
      description: "Start direct stofzuigen beneden via knop"

      trigger:
        - platform: state
          entity_id: input_button.stofzuig_beneden

      mode: single

      action:
      # Stuur MQTT commando
        - service: mqtt.publish
