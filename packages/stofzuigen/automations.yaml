      # Zet "nodig" uit
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.stofzuigen_beneden_nodig

  # Tweede verdieping: handmatig stofzuigen
    - id: stofzuigen_handmatig_tweede
      alias: "Stofzuigen: handmatig tweede"
      description: "Start direct stofzuigen tweede verdieping via knop"

      trigger:
        - platform: state
          entity_id: input_button.stofzuig_tweede

      mode: single

      action:
      # Stuur MQTT commando
        - service: mqtt.publish
          data:
            topic: valetudo/tweede/MapSegmentationCapability/clean/set
            payload: '{"segment_ids": [16, 17, 18, 19], "iterations": 1}'
            qos: 1
      # Update laatste schoonmaak tijd
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.stofzuigen_tweede_last_clean
          data:
