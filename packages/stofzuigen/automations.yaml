      # Increment clean counter
        - service: input_number.increment
          target:
            entity_id: input_number.stofzuigen_tweede_clean_count
      # Zet "nodig" uit
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.stofzuigen_tweede_nodig

  # Eerste verdieping: handmatig stofzuigen (voorbereid voor toekomst)
    - id: stofzuigen_handmatig_eerste
      alias: "Stofzuigen: handmatig eerste"
      description: "Start direct stofzuigen eerste verdieping via knop (nog geen stofzuiger)"

      trigger:
        - platform: state
          entity_id: input_button.stofzuig_eerste

      mode: single

      action:
      # TODO: Implementeren als eerste verdieping stofzuiger heeft
      # - service: mqtt.publish
      #   data:
      #     topic: valetudo/eerste/MapSegmentationCapability/clean/set
      #     payload: '{"segment_ids": [...], "iterations": 1}'
      #     qos: 1
        - service: system_log.write
          data:
            message: "Stofzuigen eerste verdieping: nog geen stofzuiger geconfigureerd"
            level: warning

  # ============================================================================
  # OPVANGBAK VOL - NAAR PRULLENBAK
  # ============================================================================

  # Beneden: opvangbak vol
    - id: stofzuigen_opvangbak_vol_beneden
      alias: "Stofzuigen: opvangbak vol beneden"
      description: "Stuur stofzuiger naar prullenbak als opvangbak vol is"

      trigger:
        - platform: state
          entity_id: alarm_control_panel.huis
          to:
            - armed_home
            - disarmed

      condition:
      # Clean counter moet >= 3 zijn
        - condition: numeric_state
          entity_id: input_number.stofzuigen_beneden_clean_count
          above: 2.9

      mode: single

      action:
      # Stuur naar prullenbak locatie
        - service: mqtt.publish
          data:
            topic: valetudo/beneden/GoToLocationCapability/go/set
            payload: '{"coordinates": {"x": 2557, "y": 2410}}'
            qos: 1
      # Reset counter
        - service: input_number.set_value
          target:
            entity_id: input_number.stofzuigen_beneden_clean_count
          data:
            value: 0

  # Tweede verdieping: opvangbak vol
    - id: stofzuigen_opvangbak_vol_tweede
      alias: "Stofzuigen: opvangbak vol tweede"
      description: "Stuur stofzuiger naar prullenbak als opvangbak vol is"

      trigger:
        - platform: state
          entity_id: alarm_control_panel.huis
          to:
            - armed_home
            - disarmed

      condition:
      # Clean counter moet >= 3 zijn
        - condition: numeric_state
          entity_id: input_number.stofzuigen_tweede_clean_count
          above: 2.9

      mode: single

      action:
      # Stuur naar prullenbak locatie
        - service: mqtt.publish
          data:
            topic: valetudo/tweede/GoToLocationCapability/go/set
            payload: '{"coordinates": {"x": 2867, "y": 2517}}'
            qos: 1
      # Reset counter
        - service: input_number.set_value
          target:
            entity_id: input_number.stofzuigen_tweede_clean_count
          data:
            value: 0
