stofzuigen_automations:
  automation:
  # Stofzuigen Package - Automations
  # Part of 2026-update: native HA vacuum automation
  # Migratie van AppDaemon vacuum logica naar native HA

  # ============================================================================
  # DAGELIJKSE INTERVAL CHECK
  # ============================================================================
  # Zet "nodig" boolean op 'on' als interval voorbij is

  # Beneden: elke dag (interval 1 dag)
    - id: stofzuigen_check_interval_beneden
      alias: "Stofzuigen: check interval beneden"
      description: "Zet stofzuigen_beneden_nodig op 'on' als 1 dag geleden"

      trigger:
        - platform: time
          at: "07:00:00"

      condition:
        - condition: state
          entity_id: input_boolean.stofzuigen_auto_modus
          state: "on"
        - condition: template
          value_template: >
            {% set last = states('input_datetime.stofzuigen_beneden_last_clean') %}
            {% if last in ['unknown', 'unavailable'] %}
              true
            {% else %}
              {% set days_ago = (now() - strptime(last, '%Y-%m-%d %H:%M:%S')).days %}
              {{ days_ago >= 1 }}
            {% endif %}

      mode: single

      action:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.stofzuigen_beneden_nodig

  # Eerste verdieping: om de dag (interval 2 dagen) - voorbereid voor toekomst
    - id: stofzuigen_check_interval_eerste
      alias: "Stofzuigen: check interval eerste"
      description: "Zet stofzuigen_eerste_nodig op 'on' als 2 dagen geleden"

      trigger:
        - platform: time
          at: "07:00:00"

      condition:
        - condition: state
          entity_id: input_boolean.stofzuigen_auto_modus
          state: "on"
        - condition: template
          value_template: >
            {% set last = states('input_datetime.stofzuigen_eerste_last_clean') %}
            {% if last in ['unknown', 'unavailable'] %}
              true
            {% else %}
              {% set days_ago = (now() - strptime(last, '%Y-%m-%d %H:%M:%S')).days %}
              {{ days_ago >= 2 }}
            {% endif %}

      mode: single

      action:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.stofzuigen_eerste_nodig

  # Tweede verdieping: om de dag (interval 2 dagen)
    - id: stofzuigen_check_interval_tweede
      alias: "Stofzuigen: check interval tweede"
      description: "Zet stofzuigen_tweede_nodig op 'on' als 2 dagen geleden"

      trigger:
        - platform: time
          at: "07:00:00"

      condition:
        - condition: state
          entity_id: input_boolean.stofzuigen_auto_modus
          state: "on"
        - condition: template
          value_template: >
            {% set last = states('input_datetime.stofzuigen_tweede_last_clean') %}
            {% if last in ['unknown', 'unavailable'] %}
              true
            {% else %}
              {% set days_ago = (now() - strptime(last, '%Y-%m-%d %H:%M:%S')).days %}
              {{ days_ago >= 2 }}
            {% endif %}

      mode: single

      action:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.stofzuigen_tweede_nodig

  # ============================================================================
  # AUTOMATISCH STOFZUIGEN BIJ ARMED_AWAY
  # ============================================================================

  # Beneden: automatisch stofzuigen
    - id: stofzuigen_auto_beneden
      alias: "Stofzuigen: auto beneden"
      description: "Start automatisch stofzuigen beneden bij armed_away"

      trigger:
        - platform: state
          entity_id: alarm_control_panel.huis
          to: armed_away

      condition:
      # Auto modus moet aan zijn
        - condition: state
          entity_id: input_boolean.stofzuigen_auto_modus
          state: "on"
      # Moet nodig zijn
        - condition: state
          entity_id: input_boolean.stofzuigen_beneden_nodig
          state: "on"
      # Geen vakantiemodus
        - condition: state
          entity_id: input_boolean.vakantiemodus
          state: "off"
      # Niet tijdens do-not-disturb (21:00 - 07:00)
        - condition: time
          after: "07:00:00"
          before: "21:00:00"

      mode: single

      action:
      # Stuur MQTT commando
        - service: mqtt.publish
          data:
            topic: valetudo/beneden/MapSegmentationCapability/clean/set
            payload: '{"segment_ids": [17, 16, 18], "iterations": 1}'
            qos: 1
      # Update laatste schoonmaak tijd
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.stofzuigen_beneden_last_clean
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # Increment clean counter
        - service: input_number.increment
          target:
            entity_id: input_number.stofzuigen_beneden_clean_count
      # Zet "nodig" uit
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.stofzuigen_beneden_nodig

  # Tweede verdieping: automatisch stofzuigen
    - id: stofzuigen_auto_tweede
      alias: "Stofzuigen: auto tweede"
      description: "Start automatisch stofzuigen tweede verdieping bij armed_away"

      trigger:
        - platform: state
          entity_id: alarm_control_panel.huis
          to: armed_away

      condition:
      # Auto modus moet aan zijn
        - condition: state
          entity_id: input_boolean.stofzuigen_auto_modus
          state: "on"
      # Moet nodig zijn
        - condition: state
          entity_id: input_boolean.stofzuigen_tweede_nodig
          state: "on"
      # Geen vakantiemodus
        - condition: state
          entity_id: input_boolean.vakantiemodus
          state: "off"
      # Niet tijdens do-not-disturb (21:00 - 07:00)
        - condition: time
          after: "07:00:00"
          before: "21:00:00"

      mode: single

      action:
      # Stuur MQTT commando
        - service: mqtt.publish
          data:
            topic: valetudo/tweede/MapSegmentationCapability/clean/set
            payload: '{"segment_ids": [16, 17, 18, 19], "iterations": 1}'
            qos: 1
      # Update laatste schoonmaak tijd
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.stofzuigen_tweede_last_clean
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # Increment clean counter
        - service: input_number.increment
          target:
            entity_id: input_number.stofzuigen_tweede_clean_count
      # Zet "nodig" uit
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.stofzuigen_tweede_nodig

  # ============================================================================
  # HANDMATIGE SCHOONMAAK KNOPPEN
  # ============================================================================

  # Beneden: handmatig stofzuigen
