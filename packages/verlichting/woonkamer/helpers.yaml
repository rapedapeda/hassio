woonkamer_helpers:
# Verlichting Helpers - Woonkamer
# Input helpers voor automatische verlichting

  input_boolean:
    verlichting_woonkamer_auto:
      name: "Auto verlichting"
      icon: mdi:lightbulb-auto
      initial: true

  input_number:
    woonkamer_aanwezigheid_timeout:
      name: "Aanwezigheid timeout"
      min: 1
      max: 30
      step: 1
      mode: box
      unit_of_measurement: "min"
      icon: mdi:timer-outline
      initial: 10

    woonkamer_illuminance_threshold:
      name: "Lichtsterkte drempel"
      min: 0
      max: 100
      step: 5
      mode: box
      unit_of_measurement: "lx"
      icon: mdi:brightness-6
      initial: 20

  # Template binary sensor: occupancy met PIR (initiëren) en mmWave (verlengen)
  template:
    - binary_sensor:
        - name: "Woonkamer occupancy"
          device_class: occupancy
          # PIR kan initiëren, mmWave kan alleen verlengen (this.state check)
          state: >-
            {{
              is_state('binary_sensor.beweging_eetkamer_occupancy', 'on') or
              (is_state('binary_sensor.beweging_woonkamer_mmwave', 'on') and this.state == 'on')
            }}
