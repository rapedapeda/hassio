woonkamer_helpers:
# Verlichting Helpers - Woonkamer
# Input helpers voor automatische verlichting

  input_boolean:
    verlichting_woonkamer_auto:
      name: "Woonkamer automatische verlichting"
      icon: mdi:lightbulb-auto
      initial: true

  input_number:
    woonkamer_aanwezigheid_timeout:
      name: "Woonkamer aanwezigheid timeout"
      min: 1
      max: 30
      step: 1
      mode: box
      unit_of_measurement: "min"
      icon: mdi:timer-outline
      initial: 10

    woonkamer_illuminance_threshold:
      name: "Woonkamer lichtsterkte drempel"
      min: 0
      max: 100
      step: 5
      mode: box
      unit_of_measurement: "lx"
      icon: mdi:brightness-6
      initial: 20
