verlichting_kerst:
# Verlichting Package - Kerstverlichting

  input_boolean:
    kerst:
      name: Kerst
      icon: mdi:pine-tree

  automation:
    # Kerstverlichting aan bij thuiskomst, uit bij vertrek
    - id: kerst_woonkamer
      alias: Kerst woonkamer
      trigger:
        - platform: state
          entity_id: alarm_control_panel.huis
      condition:
        - condition: state
          entity_id: input_boolean.kerst
          state: 'on'
      action:
        - service: >-
            {% if is_state('alarm_control_panel.huis', 'armed_away') %}
              light.turn_off
            {% else %}
              light.turn_on
            {% endif %}
          target:
            entity_id: light.kerst
